    <title>Unfold</title>

    <meta
      name="description"
      content="Unfold is a lightweight FAQ (Frequently Asked Questions) accordion component built entirely with vanilla TypeScript — no frameworks, no runtime dependencies. It renders a list of questions where each item can be expanded to reveal its answer. Only one question can be open at a time: clicking an open question collapses it, and clicking a different one automatically closes the current one before opening the new one."
    />
    <meta name="keywords" content="Questions, Question, Faq, FAQ, Unfold" />
    <meta name="author" content="Diego Libonati" />
